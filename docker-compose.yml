version: '3.8'
services:
  frontend:
    image: node:22-alpine
    working_dir: /app/v2
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_PROXY_TARGET=http://localhost:5000
    volumes:
      - ./v2:/app/v2
      - /app/v2/node_modules
    ports:
      - "3000:3000"
